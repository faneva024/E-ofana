# ===================================================================
# 1. APPLICATION INFO
# ===================================================================
spring.application.name=eofana
server.port=8080

# ===================================================================
# 2. CONFIGURATION POSTGRESQL
# ===================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/eofanaDb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# 3. CONFIGURATION FLYWAY
# ===================================================================
spring.flyway.enabled=true
spring.flyway.schemas=eofana
spring.flyway.default-schema=eofana
# Commande magique pour que Flyway crée le schéma si la base est neuve :
spring.flyway.create-schemas=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ===================================================================
# 4. CONFIGURATION JPA / HIBERNATE
# ===================================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.default_schema=eofana

# --- AJOUTEZ CETTE LIGNE ---
# Force Hibernate à utiliser EXACTEMENT les noms définis dans @Column
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Note : Le dialecte est détecté automatiquement, vous pouvez supprimer la ligne suivante pour nettoyer vos logs :
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# 5. MODULE FORMATEUR — VIREMENTS AUTOMATIQUES (T-B-113 / T-B-117)
# ===================================================================
# Fréquence par défaut : hebdomadaire = chaque lundi 06h00, mensuel = le 1er du mois à 06h00
eofana.virements.cron-hebdomadaire=0 0 6 * * MON
eofana.virements.cron-mensuel=0 0 6 1 * *

# URL du micro-service Node.js d'envoi d'email (services/service-email,
# cf. docker-compose.yml) — utilisé par AutomaticTransferService pour
# transmettre le justificatif de virement (notifications, typeNotif = VIREMENT)
eofana.service-email.url=http://localhost:3001