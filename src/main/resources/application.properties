spring.application.name=eofana
server.port=8081

# ===============================
# CONFIGURATION POSTGRESQL
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/eofanaDb?currentSchema=eofana
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# CONFIGURATION FLYWAY
# ===============================
spring.flyway.enabled=true
spring.flyway.schemas=eofana
spring.flyway.default-schema=eofana
spring.flyway.locations=classpath:db/migration

# ===============================
# CONFIGURATION JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.default_schema=eofana
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===============================
# IMPORTANT : garder les noms camelCase exacts de PostgreSQL
# Exemple : idFormation, idCategorie, idCentre, prixRemise
# ===============================
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.properties.hibernate.globally_quoted_identifiers_skip_column_definitions=true