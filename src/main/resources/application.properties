# ===================================================================
# 1. APPLICATION INFO
# ===================================================================
spring.application.name=eofana
server.port=8080

# ===================================================================
# 2. CONFIGURATION POSTGRESQL
# ===================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/eofanaDb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# 3. CONFIGURATION FLYWAY
# ===================================================================
spring.flyway.enabled=true
spring.flyway.schemas=eofana
spring.flyway.default-schema=eofana
# Commande magique pour que Flyway crée le schéma si la base est neuve :
spring.flyway.create-schemas=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ===================================================================
# 4. CONFIGURATION JPA / HIBERNATE
# ===================================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.default_schema=eofana

# --- AJOUTEZ CETTE LIGNE ---
# Force Hibernate à utiliser EXACTEMENT les noms définis dans @Column
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Note : Le dialecte est détecté automatiquement, vous pouvez supprimer la ligne suivante pour nettoyer vos logs :
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# 5. CONFIGURATION JWT (T-B-015 / T-B-016)
# ===================================================================
# Clé de signature HMAC-SHA256 : a minima 32 caracteres, a definir
# via une variable d'environnement en production (ne jamais committer
# la vraie valeur). Duree de validite du token : 24h par defaut.
eofana.jwt.secret=${EOFANA_JWT_SECRET:changez-cette-cle-secrete-en-production-eofana-2026}
eofana.jwt.expiration-ms=86400000