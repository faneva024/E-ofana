# ===================================================================
# 1. APPLICATION INFO
# ===================================================================
spring.application.name=eofana
server.port=8080

# ===================================================================
# 2. CONFIGURATION POSTGRESQL
# ===================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/eofanaDb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# 3. CONFIGURATION FLYWAY
# ===================================================================
spring.flyway.enabled=true
spring.flyway.schemas=eofana
spring.flyway.default-schema=eofana
spring.flyway.create-schemas=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ===================================================================
# 4. CONFIGURATION JPA / HIBERNATE
# ===================================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.default_schema=eofana
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# 5. MODULE FORMATEUR — Semaine 2 (T-B-117)
# Ajout par ROLPH pour activer ServiceVirementAutomatique (@Scheduled)
# ===================================================================

# Pool de threads dédié aux tâches planifiées (@EnableScheduling)
spring.task.scheduling.pool.size=2
spring.task.scheduling.thread-name-prefix=eofana-scheduler-

# Dossier de stockage des justificatifs PDF de virement
eofana.virements.dossier-justificatifs=uploads/justificatifs-virements
